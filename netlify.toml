# Konfigurasi deploy Netlify untuk Next.js 14 (Brand.Inc)
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Runtime resmi Next.js (SSR, server actions, middleware) — otomatis dipakai Netlify,
# didefinisikan eksplisit agar konsisten.
[[plugins]]
  package = "@netlify/plugin-nextjs"
